services:
  - type: web
    name: autonomous-research-api
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: npm ci && npm run build:api
    startCommand: npm run start -w @autonomous/api
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: RUN_MIGRATIONS_ON_BOOT
        value: "true"
      - key: LOG_LEVEL
        value: info
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_TIMEOUT_MS
        value: "15000"
      - key: TAVILY_API_KEY
        sync: false

  - type: worker
    name: autonomous-research-worker
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: npm ci && npm run build:api
    startCommand: npm run start:worker -w @autonomous/api
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: RUN_MIGRATIONS_ON_BOOT
        value: "false"
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_TIMEOUT_MS
        value: "15000"
      - key: TAVILY_API_KEY
        sync: false
